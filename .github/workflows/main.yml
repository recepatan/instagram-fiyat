name: Instagram Altın Botu

on:
  schedule:
    # Her gün Türkiye saatiyle sabah 10:00 ve akşam 18:00'de çalışır
    - cron: '0 7,15 * * *' 
  workflow_dispatch: # Manuel çalıştırmak istersen buton çıkar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kütüphaneleri Yükle (pip install)
        run: |
          pip install requests pillow instagrapi pytz

      - name: Botu Çalıştır
        env:
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
        run: python bot.py
