name: Instagram Altın Botu

on:
  schedule:
    # Her gün Türkiye saatiyle sabah 10:15 ve akşam 18:15'te çalışır.
    # (UTC saatine göre 07:15 ve 15:15 olarak ayarlanmıştır)
    - cron: '15 7,15 * * *' 
  workflow_dispatch: # Manuel çalıştırmak için butonu aktif eder

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v3

      - name: Python 3.10 Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Hatanın çözümü için sürüm yükseltildi

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow instagrapi pytz

      - name: Botu Çalıştır
        env:
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
        run: python bot.py
