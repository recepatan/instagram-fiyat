name: Instagram Altın Botu

on:
  schedule:
    # Her gün Türkiye saatiyle 10:15 ve 18:15'te çalışır.
    - cron: '15 7,15 * * *'
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu depodan çek
        uses: actions/checkout@v3

      - name: Python 3.10 Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow instagrapi pytz

      - name: Botu Çalıştır
        env:
          # ÖNEMLİ: Secrets kısmına INSTA_SESSIONID eklemiş olmalısın
          INSTA_SESSIONID: ${{ secrets.INSTA_SESSIONID }}
        run: python bot.py
