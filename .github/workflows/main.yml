name: Altin Fiyatlari Botu

on:
  schedule:
    - cron: '0 6-16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo Kontrol
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versiyon yükseltildi

      - name: Kütüphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Botu Calistir
        env:
          BLOGGER_TOKEN: ${{ secrets.BLOGGER_TOKEN }}
          BLOGGER_ID: ${{ secrets.BLOGGER_ID }}
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: python bot.py
